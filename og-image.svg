<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1C2B3A"/>
  <!-- Diagonal cream panel -->
  <polygon points="650,0 1200,0 1200,630 550,630" fill="#F8F5EE" opacity="0.06"/>
  <!-- Logo mark -->
  <rect x="100" y="215" width="100" height="100" rx="24" fill="#1C2B3A" stroke="#C9A84C" stroke-width="4"/>
  <text font-family="Georgia,serif" font-size="60" font-weight="700" fill="#C9A84C" x="115" y="290">D</text>
  <path d="M168 245 L188 265 L168 285" stroke="#C9A84C" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Company name -->
  <text font-family="Georgia,serif" font-size="72" font-weight="700" fill="#FFFFFF" x="220" y="290">Digit<tspan fill="#C9A84C">wise</tspan></text>
  <text font-family="Georgia,serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.5)" x="222" y="340">Consulting</text>
  <!-- Tagline -->
  <text font-family="Arial,sans-serif" font-size="28" fill="rgba(255,255,255,0.45)" x="100" y="420">Expert accounting for AU &amp; US small businesses</text>
  <!-- Gold accent line -->
  <rect x="100" y="455" width="200" height="3" fill="#C9A84C" rx="2"/>
  <!-- Trust pills -->
  <rect x="100" y="490" width="180" height="40" rx="20" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.3)" stroke-width="1.5"/>
  <text font-family="Arial,sans-serif" font-size="18" fill="#C9A84C" x="130" y="516" font-weight="700">🇦🇺 ATO Compliant</text>
  <rect x="300" y="490" width="180" height="40" rx="20" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.3)" stroke-width="1.5"/>
  <text font-family="Arial,sans-serif" font-size="18" fill="#C9A84C" x="328" y="516" font-weight="700">🇺🇸 IRS Compliant</text>
  <rect x="500" y="490" width="200" height="40" rx="20" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.3)" stroke-width="1.5"/>
  <text font-family="Arial,sans-serif" font-size="18" fill="#C9A84C" x="530" y="516" font-weight="700">🔒 Fixed Pricing</text>
  <!-- URL -->
  <text font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.25)" x="100" y="590">digitwiseconsulting.com.au</text>
