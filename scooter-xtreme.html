<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scooter Xtreme — Neon Rush</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;600;900&display=swap');

:root {
  --neon-purple: #bf00ff;
  --neon-cyan: #00f5ff;
  --neon-yellow: #ffe600;
  --neon-orange: #ff6a00;
  --neon-pink: #ff0080;
  --dark-bg: #05010f;
  --road-dark: #0a0818;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  background: var(--dark-bg);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  font-family:'Exo 2', sans-serif;
}

#wrap {
  position:relative;
  width: min(480px, 100vw);
  height: min(780px, 100vh);
}

#c {
  width:100%; height:100%;
  display:block;
  border-radius: min(20px, 2vw);
  image-rendering: pixelated;
}

/* HUD */
#hud {
  position:absolute; top:0; left:0; right:0;
  padding: 14px 16px 0;
  display:flex; gap:8px; align-items:flex-start;
  pointer-events:none;
}
.hpill {
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  padding: 5px 12px;
  display:flex; flex-direction:column; align-items:center;
  min-width:64px;
}
.hlabel { font-size:8px; font-weight:600; letter-spacing:2px; color:rgba(255,255,255,0.4); text-transform:uppercase; }
.hval { font-family:'Russo One', sans-serif; font-size:20px; color:#fff; line-height:1.15; }
#multiplierBadge {
  margin-left:auto;
  background: linear-gradient(135deg,#ff6a00,#ff0080);
  border-radius:10px; padding:5px 10px;
  font-family:'Russo One',sans-serif; font-size:16px; color:#fff;
  display:none;
}

/* Nitro bar */
#nitroWrap {
  position:absolute; bottom:100px; left:50%; transform:translateX(-50%);
  width:180px; pointer-events:none;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
#nitroLabel { font-size:9px; font-weight:900; letter-spacing:3px; color:var(--neon-cyan); opacity:0.7; }
#nitroTrack {
  width:100%; height:8px;
  background:rgba(0,245,255,0.1);
  border:1px solid rgba(0,245,255,0.25);
  border-radius:4px; overflow:hidden;
}
#nitroBar {
  height:100%; width:100%;
  background:linear-gradient(90deg,var(--neon-cyan),var(--neon-purple));
  border-radius:4px;
  transition:width .1s;
  box-shadow:0 0 8px var(--neon-cyan);
}

/* Trick flash */
#trickFlash {
  position:absolute; top:40%; left:50%; transform:translate(-50%,-50%) scale(0);
  font-family:'Russo One',sans-serif; font-size:32px; white-space:nowrap;
  padding:8px 28px; border-radius:14px;
  pointer-events:none; z-index:20;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1), opacity .25s;
  opacity:0;
}
#trickFlash.show { transform:translate(-50%,-50%) scale(1); opacity:1; }

/* Combo meter */
#comboMeter {
  position:absolute; right:14px; top:80px;
  display:flex; flex-direction:column; align-items:flex-end; gap:2px;
  pointer-events:none;
}
#comboNum { font-family:'Russo One',sans-serif; font-size:28px; color:#ffe600; text-shadow:0 0 12px #ffe600; display:none; }
#comboLabel { font-size:9px; letter-spacing:2px; color:rgba(255,230,0,0.6); display:none; }

/* Mobile controls */
#mctrl {
  position:absolute; bottom:14px; left:0; right:0;
  display:none; justify-content:space-between; align-items:center;
  padding:0 14px; pointer-events:none;
}
.mb { width:64px; height:64px; border-radius:50%; pointer-events:all;
  background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; cursor:pointer; user-select:none; transition:background .1s; }
.mb:active { background:rgba(255,255,255,0.3); }
#btnN { background:rgba(0,245,255,0.15); border-color:var(--neon-cyan); font-size:18px; }
#btnN.active { background:rgba(0,245,255,0.35); box-shadow:0 0 16px var(--neon-cyan); }

/* Screens */
.screen {
  position:absolute; inset:0; border-radius: min(20px,2vw);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(5,1,15,0.92); backdrop-filter:blur(10px);
  gap:16px; z-index:30;
}
.screen.off { display:none; }

.gtitle {
  font-family:'Russo One',sans-serif;
  font-size:clamp(48px,12vw,72px);
  line-height:.9;
  text-align:center;
  background:linear-gradient(135deg,var(--neon-cyan),var(--neon-purple),var(--neon-pink));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(191,0,255,0.6));
}
.gsub { font-size:11px; letter-spacing:4px; color:rgba(255,255,255,0.4); text-transform:uppercase; }

.kgrid {
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
  max-width:280px; margin:4px 0;
}
.kcard {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px; padding:10px 12px;
  text-align:center;
}
.kicon { font-size:18px; }
.ktext { font-size:10px; color:rgba(255,255,255,0.5); margin-top:3px; line-height:1.3; }

.pbtn {
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));
  border:none; border-radius:14px; padding:14px 52px;
  font-family:'Russo One',sans-serif; font-size:24px; color:#fff;
  cursor:pointer; letter-spacing:1px;
  box-shadow:0 0 30px rgba(191,0,255,0.5);
  transition:transform .15s, box-shadow .15s;
}
.pbtn:hover { transform:scale(1.04); box-shadow:0 0 50px rgba(191,0,255,0.8); }
.pbtn:active { transform:scale(0.97); }

.dead-score { font-family:'Russo One',sans-serif; font-size:72px; color:#fff;
  text-shadow:0 0 30px var(--neon-yellow); }
.dead-label { font-size:11px; letter-spacing:3px; color:rgba(255,255,255,0.4); }
.best-badge { background:linear-gradient(135deg,var(--neon-yellow),var(--neon-orange));
  color:#000; font-weight:900; font-size:13px; letter-spacing:2px;
  padding:5px 16px; border-radius:20px; display:none; }
.stats-row { display:flex; gap:20px; }
.stat-box { text-align:center; }
.stat-n { font-family:'Russo One',sans-serif; font-size:22px; color:var(--neon-cyan); }
.stat-l { font-size:9px; letter-spacing:2px; color:rgba(255,255,255,0.4); }

@media(max-width:520px) { #mctrl { display:flex; } }
@media(max-width:400px) { .mb{width:54px;height:54px;} }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="480" height="780"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hpill">
      <span class="hlabel">Score</span>
      <span class="hval" id="hScore">0</span>
    </div>
    <div class="hpill">
      <span class="hlabel">Best</span>
      <span class="hval" id="hBest">0</span>
    </div>
    <div class="hpill">
      <span class="hlabel">Coins</span>
      <span class="hval" id="hCoins">0</span>
    </div>
    <div id="multiplierBadge">x<span id="multVal">1</span></div>
  </div>

  <!-- Combo -->
  <div id="comboMeter">
    <div id="comboNum">x0</div>
    <div id="comboLabel">COMBO</div>
  </div>

  <!-- Trick flash -->
  <div id="trickFlash"></div>

  <!-- Nitro -->
  <div id="nitroWrap">
    <div id="nitroLabel">NITRO</div>
    <div id="nitroTrack"><div id="nitroBar"></div></div>
  </div>

  <!-- Mobile controls -->
  <div id="mctrl">
    <button class="mb" id="btnL">◀</button>
    <button class="mb" id="btnJ">▲</button>
    <button class="mb" id="btnN">⚡ NITRO</button>
    <button class="mb" id="btnR">▶</button>
  </div>

  <!-- Start Screen -->
  <div class="screen" id="sStart">
    <div class="gtitle">SCOOTER<br>XTREME</div>
    <div class="gsub">Neon Rush Edition</div>
    <div class="kgrid">
      <div class="kcard"><div class="kicon">◀▶</div><div class="ktext">Arrow keys / Swipe to switch lanes</div></div>
      <div class="kcard"><div class="kicon">▲</div><div class="ktext">Up / Tap to jump &amp; flip off ramps</div></div>
      <div class="kcard"><div class="kicon">💎</div><div class="ktext">Collect gems &amp; coins for points</div></div>
      <div class="kcard"><div class="kicon">⚡</div><div class="ktext">Space / Nitro button for speed boost</div></div>
    </div>
    <button class="pbtn" id="btnStart">RIDE NOW</button>
  </div>

  <!-- Game Over Screen -->
  <div class="screen off" id="sOver">
    <div style="font-family:'Russo One',sans-serif;font-size:42px;color:var(--neon-pink);filter:drop-shadow(0 0 16px var(--neon-pink))">WIPEOUT!</div>
    <div class="dead-label">YOUR SCORE</div>
    <div class="dead-score" id="oScore">0</div>
    <div class="best-badge" id="oBest">🏆 NEW BEST!</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-n" id="oCoins">0</div><div class="stat-l">COINS</div></div>
      <div class="stat-box"><div class="stat-n" id="oTricks">0</div><div class="stat-l">TRICKS</div></div>
      <div class="stat-box"><div class="stat-n" id="oDist">0m</div><div class="stat-l">DISTANCE</div></div>
    </div>
    <button class="pbtn" id="btnRetry">TRY AGAIN</button>
  </div>
</div>

<script>
// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 780;

// ─── Game state ───────────────────────────────────────────────────────────────
let STATE = 'start'; // start | play | dead
let frame, score, coins, best=0, totalTricks, distance;
let speed, speedT; // current, target
let nitro, nitroOn;
let combo, comboTimer, multiplier;
let bgOff, groundOff, midOff;

// Player
const LANES = [118, 240, 362];
let lane, laneX, targetX;
let py, pvy, onGround;
let flipping, flipAngle, flipRot, flipsDone;
let hitFlash;

// Objects
let obstacles, collectibles, ramps, particles, floats, trails;

// ─── Palette ──────────────────────────────────────────────────────────────────
const C = {
  purple:'#bf00ff', cyan:'#00f5ff', yellow:'#ffe600',
  orange:'#ff6a00', pink:'#ff0080', green:'#00ff88',
  bg:'#05010f', road:'#0b0919'
};

// ─── Util ─────────────────────────────────────────────────────────────────────
const rnd=(a,b)=>Math.random()*(b-a)+a;
const rndI=(a,b)=>Math.floor(rnd(a,b+1));
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const tau=Math.PI*2;

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  frame=0; score=0; coins=0; totalTricks=0; distance=0;
  speed=5; speedT=5;
  nitro=100; nitroOn=false;
  combo=0; comboTimer=0; multiplier=1;
  bgOff=0; groundOff=0; midOff=0;
  lane=1; laneX=LANES[1]; targetX=LANES[1];
  py=620; pvy=0; onGround=true;
  flipping=false; flipAngle=0; flipRot=0; flipsDone=0;
  hitFlash=0;
  obstacles=[]; collectibles=[]; ramps=[]; particles=[]; floats=[]; trails=[];
  updateHUD();
  document.getElementById('comboNum').style.display='none';
  document.getElementById('comboLabel').style.display='none';
  document.getElementById('multiplierBadge').style.display='none';
}

// ─── Spawning ─────────────────────────────────────────────────────────────────
const GROUND_Y = 620;

function spawnObstacle() {
  const usedLanes = obstacles.filter(o=>o.y>H-200).map(o=>o.lane);
  const free = [0,1,2].filter(l=>!usedLanes.includes(l));
  if(!free.length) return;
  const l = free[rndI(0,free.length-1)];
  const type = Math.random()<0.45?'car': Math.random()<0.5?'bus':'barrier';
  obstacles.push({
    lane:l, x:LANES[l], y:H+80, type,
    w:type==='bus'?80:type==='car'?70:32,
    h:type==='bus'?54:type==='car'?50:60,
    color:['#e63946','#457b9d','#2a9d8f','#e76f51','#6a4c93'][rndI(0,4)],
    wobble:0
  });
}

function spawnRamp() {
  const l = rndI(0,2);
  if(ramps.some(r=>r.lane===l && r.y>H-150)) return;
  ramps.push({lane:l, x:LANES[l], y:H+60, w:70, h:32, hit:false});
}

function spawnCoin(l, y, type='coin') {
  collectibles.push({
    lane:l, x:LANES[l], y: y||H+30, type,
    val: type==='gem'?8:type==='star'?3:1,
    collected:false, alpha:1,
    bob:rnd(0,tau)
  });
}

function spawnNitro() {
  const l=rndI(0,2);
  collectibles.push({lane:l, x:LANES[l], y:H+30, type:'nitro',
    val:0,collected:false,alpha:1,bob:rnd(0,tau)});
}

function spawnCoinLine() {
  const l=rndI(0,2);
  for(let i=0;i<6;i++) spawnCoin(l, H+30+i*45);
}

// ─── Particles ────────────────────────────────────────────────────────────────
function burst(x,y,col,n=10,speed=5) {
  for(let i=0;i<n;i++){
    const a=rnd(0,tau), s=rnd(1,speed);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,
      col, r:rnd(2,6), life:1, decay:rnd(0.02,0.05)});
  }
}

function floatText(x,y,text,col='#ffe600') {
  floats.push({x,y,text,col,life:1,vy:-1.8});
}

// ─── Input ────────────────────────────────────────────────────────────────────
const K={};
document.addEventListener('keydown',e=>{
  K[e.key]=true;
  if(STATE!=='play') return;
  if(e.key==='ArrowLeft'||e.key==='a') goLane(-1);
  if(e.key==='ArrowRight'||e.key==='d') goLane(1);
  if((e.key==='ArrowUp'||e.key==='w')&&onGround) jump();
  if(e.key===' '&&nitro>=15){ nitroOn=!nitroOn; e.preventDefault(); }
});
document.addEventListener('keyup',e=>{ K[e.key]=false; });

function goLane(dir) {
  lane=clamp(lane+dir,0,2);
  targetX=LANES[lane];
}
function jump() {
  pvy=-17; onGround=false;
  flipping=true; flipAngle=0; flipRot=0; flipsDone=0;
  burst(laneX, GROUND_Y, C.purple, 8, 4);
}

// Mobile
['btnL','btnR','btnJ','btnN'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(STATE!=='play') return;
    if(id==='btnL') goLane(-1);
    if(id==='btnR') goLane(1);
    if(id==='btnJ'&&onGround) jump();
    if(id==='btnN'&&nitro>=15){ nitroOn=!nitroOn; }
  });
});

// Swipe
let swipeX=0,swipeY=0;
canvas.addEventListener('touchstart',e=>{swipeX=e.touches[0].clientX;swipeY=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(STATE!=='play') return;
  const dx=e.changedTouches[0].clientX-swipeX;
  const dy=e.changedTouches[0].clientY-swipeY;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx<-25) goLane(-1);
    else if(dx>25) goLane(1);
  } else if(dy<-25&&onGround) jump();
},{passive:true});

// ─── Trick system ─────────────────────────────────────────────────────────────
const TRICK_NAMES = [
  ['BACKFLIP!','#ff6a00'],['DOUBLE SPIN!','#bf00ff'],['TRIPLE TWIST!','#00f5ff'],
  ['QUAD FLIP!','#ff0080'],['PENTA SPIN!','#ffe600'],['INSANE!!','#00ff88']
];
let trickTimer=0;

function doTrick(n) {
  totalTricks++;
  const pts = n*75*multiplier;
  score+=pts;
  combo++;
  comboTimer=180;
  multiplier = Math.min(8, 1+Math.floor(combo/3));
  const [name,col] = TRICK_NAMES[Math.min(n-1,5)];
  const el=document.getElementById('trickFlash');
  el.textContent=name;
  el.style.background=`linear-gradient(135deg,${col}cc,${col}55)`;
  el.style.color='#fff';
  el.style.border=`2px solid ${col}`;
  el.style.boxShadow=`0 0 30px ${col}88`;
  el.classList.add('show');
  trickTimer=80;
  floatText(laneX, py-30, '+'+pts, col);
  updateHUD();
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  frame++;
  const spMul = nitroOn ? 1.9 : 1;
  const spd = speed * spMul;

  // Speed ramp
  speedT = Math.min(13, 5 + frame/1200);
  speed = lerp(speed, speedT, 0.003);

  distance += spd * 0.05;

  // Nitro
  if(nitroOn && nitro>0) {
    nitro-=1.0;
    if(nitro<=0){ nitro=0; nitroOn=false; }
  } else if(!nitroOn && nitro<100) nitro+=0.25;
  document.getElementById('nitroBar').style.width=nitro+'%';
  document.getElementById('btnN').classList.toggle('active',nitroOn);

  // Scrolls
  bgOff  = (bgOff  + spd*0.18) % (H*2);
  midOff = (midOff + spd*0.5)  % H;
  groundOff = (groundOff + spd) % 80;

  // Lane ease
  laneX = lerp(laneX, targetX, 0.14);

  // Gravity
  if(!onGround) {
    pvy += 0.62;
    py += pvy;
    if(py >= GROUND_Y) {
      py=GROUND_Y; onGround=true; pvy=0;
      if(flipping) { flipping=false; }
    }
  }

  // Flip rotation
  if(flipping) {
    flipAngle += 0.2;
    const revs = Math.floor(flipAngle/(tau));
    if(revs > flipsDone) { flipsDone=revs; }
    flipRot = flipAngle % tau;
  }

  // Trick banner dismiss
  if(trickTimer>0){ trickTimer--; if(!trickTimer) document.getElementById('trickFlash').classList.remove('show'); }

  // Combo decay
  if(combo>0){
    comboTimer--;
    if(comboTimer<=0){ combo=0; multiplier=1; }
    document.getElementById('comboNum').textContent='x'+combo;
    document.getElementById('comboNum').style.display=combo>1?'block':'none';
    document.getElementById('comboLabel').style.display=combo>1?'block':'none';
    document.getElementById('multiplierBadge').style.display=multiplier>1?'flex':'none';
    document.getElementById('multVal').textContent=multiplier;
  }

  // Ramp collision
  ramps.forEach(r=>{
    r.y -= spd;
    if(!r.hit && Math.abs(r.x-laneX)<38 && Math.abs(r.y-GROUND_Y)<24 && onGround) {
      r.hit=true;
      pvy=-18; onGround=false;
      flipping=true; flipAngle=0; flipRot=0; flipsDone=0;
      burst(laneX, GROUND_Y, C.orange, 14, 6);
    }
  });

  // On-land trick score
  if(onGround && flipsDone>0) {
    doTrick(flipsDone);
    flipsDone=0;
  }

  // Obstacles move + collision
  hitFlash=Math.max(0,hitFlash-1);
  for(let o of obstacles) {
    o.y -= spd;
    o.wobble = Math.sin(frame*0.1)*1.2;
    const ox=o.x, oy=o.y;
    const hitW = o.type==='barrier'?22:34;
    if(Math.abs(ox-laneX)<hitW+12 && oy>py-o.h-5 && oy<py+12) {
      die(); return;
    }
  }

  // Collectibles
  collectibles.forEach(c=>{
    c.y -= spd;
    c.bob += 0.06;
    if(c.collected) { c.alpha-=0.07; return; }
    if(Math.abs(c.x-laneX)<22 && Math.abs(c.y-py)<22) {
      c.collected=true;
      if(c.type==='nitro') {
        nitro=Math.min(100,nitro+50);
        burst(c.x,c.y,C.cyan,14,5);
        floatText(c.x,c.y,'⚡ NITRO!',C.cyan);
      } else {
        const pts=c.val*10*multiplier;
        score+=pts; coins+=c.val;
        burst(c.x,c.y,c.type==='gem'?C.cyan:c.type==='star'?C.yellow:C.yellow,8,4);
        floatText(c.x,c.y,'+'+pts);
        updateHUD();
      }
    }
  });

  // Score tick
  if(frame%5===0){ score+=multiplier; updateHUD(); }

  // Spawn schedule
  const rate = Math.max(0.3, 1-frame/8000);
  if(frame%Math.max(28,Math.floor(90*rate))===0) spawnObstacle();
  if(frame%Math.max(60,Math.floor(160*rate))===0) spawnRamp();
  if(frame%Math.max(18,Math.floor(55*rate))===0) spawnCoin(rndI(0,2));
  if(frame%120===0) spawnCoinLine();
  if(frame%Math.max(80,Math.floor(200*rate))===0) {
    if(Math.random()<0.3) spawnCoin(rndI(0,2),H+30,'gem');
    else if(Math.random()<0.4) spawnCoin(rndI(0,2),H+30,'star');
  }
  if(frame%280===0) spawnNitro();

  // Cleanup
  obstacles=obstacles.filter(o=>o.y>-120);
  ramps=ramps.filter(r=>r.y>-80);
  collectibles=collectibles.filter(c=>c.y>-60&&c.alpha>0);

  // Particles
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=p.decay; });
  particles=particles.filter(p=>p.life>0);

  // Floats
  floats.forEach(f=>{ f.y+=f.vy; f.life-=0.022; });
  floats=floats.filter(f=>f.life>0);

  // Scooter trail
  if(frame%3===0) trails.push({x:laneX,y:py,life:1,r:nitroOn?8:4});
  trails.forEach(t=>{ t.life-=0.08; });
  trails=trails.filter(t=>t.life>0);
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function drawSky() {
  // Deep space gradient
  const g=ctx.createLinearGradient(0,0,0,GROUND_Y);
  g.addColorStop(0,'#02000a');
  g.addColorStop(0.5,'#0a0128');
  g.addColorStop(1,'#1a0044');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,GROUND_Y);

  // Stars with parallax
  ctx.save();
  for(let i=0;i<90;i++){
    const sx=((i*137.5+bgOff*0.08)%W+W)%W;
    const sy=((i*73.1)%(GROUND_Y*0.85));
    const blink=0.4+0.6*(Math.sin(frame*0.02+i)*0.5+0.5);
    const r=0.5+(i%4)*0.4;
    ctx.fillStyle=`rgba(255,255,255,${blink*0.8})`;
    ctx.beginPath(); ctx.arc(sx,sy,r,0,tau); ctx.fill();
  }
  ctx.restore();

  // Distant neon skyline (far layer)
  ctx.save();
  const buildings=[
    [0,55,160],[45,40,180],[90,70,140],[140,35,200],
    [185,60,155],[230,45,175],[275,80,130],[315,38,195],
    [360,65,160],[400,50,185],[440,75,145],[460,42,200]
  ];
  buildings.forEach(([bx,bw,bh])=>{
    const x=((bx-bgOff*0.2)%W+W)%W;
    ctx.fillStyle='#07021a';
    ctx.fillRect(x-bw/2, GROUND_Y-bh, bw, bh);
    // Neon windows
    for(let wy=GROUND_Y-bh+8;wy<GROUND_Y-8;wy+=14){
      for(let wx=x-bw/2+5;wx<x+bw/2-5;wx+=12){
        if(Math.random()<0.35||frame%60<2){
          const wcols=['rgba(191,0,255,0.35)','rgba(0,245,255,0.3)','rgba(255,230,0,0.3)'];
          ctx.fillStyle=wcols[Math.floor((wx+wy)%3)];
          ctx.fillRect(wx,wy,7,7);
        }
      }
    }
  });
  ctx.restore();

  // Mid layer buildings (faster parallax)
  ctx.save();
  const mid=[
    [20,38,110],[65,30,130],[105,45,95],[155,28,140],
    [200,42,110],[245,35,125],[290,50,100],[330,30,135],
    [375,44,115],[415,32,130]
  ];
  mid.forEach(([bx,bw,bh])=>{
    const x=((bx-midOff*0.6)%W+W)%W;
    ctx.fillStyle='#0c0428';
    ctx.fillRect(x-bw/2, GROUND_Y-bh, bw, bh);
    // Rooftop neon signs
    const signCols=['#bf00ff','#00f5ff','#ff0080'];
    ctx.strokeStyle=signCols[Math.floor(x)%3];
    ctx.lineWidth=2;
    ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=8;
    ctx.strokeRect(x-bw/2+3, GROUND_Y-bh-3, bw-6, 3);
    ctx.shadowBlur=0;
  });
  ctx.restore();
}

function drawRoad() {
  // Road surface
  const rg=ctx.createLinearGradient(0,GROUND_Y,0,H);
  rg.addColorStop(0,'#0e0a22');
  rg.addColorStop(1,'#060314');
  ctx.fillStyle=rg;
  ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);

  // Lane dividers with glow
  ctx.save();
  ctx.setLineDash([34,22]);
  ctx.lineDashOffset=-groundOff;
  [179,301].forEach(lx=>{
    ctx.strokeStyle='rgba(255,255,255,0.12)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(lx,GROUND_Y); ctx.lineTo(lx,H); ctx.stroke();
  });
  ctx.setLineDash([]);
  ctx.restore();

  // Ground glow strip
  const gg=ctx.createLinearGradient(0,GROUND_Y,0,GROUND_Y+50);
  gg.addColorStop(0,'rgba(191,0,255,0.3)');
  gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg; ctx.fillRect(0,GROUND_Y,W,50);

  // Lane glow channels
  LANES.forEach(lx=>{
    const lg=ctx.createLinearGradient(lx-50,0,lx+50,0);
    lg.addColorStop(0,'transparent');
    lg.addColorStop(0.5,'rgba(191,0,255,0.07)');
    lg.addColorStop(1,'transparent');
    ctx.fillStyle=lg;
    ctx.fillRect(lx-50,GROUND_Y,100,H-GROUND_Y);
  });

  // Road edge neon lines
  ['#bf00ff','#00f5ff'].forEach((col,i)=>{
    ctx.strokeStyle=col+'55';
    ctx.lineWidth=3;
    ctx.shadowColor=col; ctx.shadowBlur=12;
    const ex=i===0?30:W-30;
    ctx.beginPath(); ctx.moveTo(ex,GROUND_Y); ctx.lineTo(ex,H); ctx.stroke();
    ctx.shadowBlur=0;
  });
}

function drawRamp(r) {
  if(r.y < GROUND_Y-80 || r.y > H+80) return;
  ctx.save();
  ctx.shadowColor=C.orange; ctx.shadowBlur=14;
  // Ramp wedge
  ctx.fillStyle='#ff6a00';
  ctx.beginPath();
  ctx.moveTo(r.x-35, GROUND_Y);
  ctx.lineTo(r.x+35, GROUND_Y);
  ctx.lineTo(r.x+12, r.y-32);
  ctx.lineTo(r.x-12, r.y-32);
  ctx.closePath(); ctx.fill();
  // Stripe
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.moveTo(r.x-35,GROUND_Y); ctx.lineTo(r.x-12,r.y-32);
  ctx.lineTo(r.x,r.y-32); ctx.lineTo(r.x-15,GROUND_Y);
  ctx.closePath(); ctx.fill();
  // Lip
  ctx.fillStyle='#ffb347';
  ctx.fillRect(r.x-14,r.y-36,28,6);
  // Jump arrow
  ctx.fillStyle='#fff';
  ctx.font='bold 13px Exo\\ 2,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('↑', r.x, r.y-22);
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawCar(o) {
  const {x,y,type,color,wobble}=o;
  ctx.save(); ctx.translate(x+wobble,y);

  if(type==='barrier') {
    // Crash barrier
    ctx.fillStyle='#cc1122';
    ctx.shadowColor='#ff0000'; ctx.shadowBlur=8;
    ctx.fillRect(-16,-62,32,62);
    for(let i=0;i<5;i++){
      ctx.fillStyle=i%2===0?'#fff':'#cc1122';
      ctx.fillRect(-16,-62+i*13,32,13);
    }
    ctx.fillStyle='#ffdd00';
    ctx.shadowColor='#ffdd00'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(0,-64,8,0,tau); ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore(); return;
  }

  const isBus = type==='bus';
  const bw=isBus?78:68, bh=isBus?52:48;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0,6,bw/2+4,10,0,0,tau); ctx.fill();

  // Body
  ctx.fillStyle=color;
  ctx.shadowColor=color+'88'; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.roundRect(-bw/2,-bh,bw,bh,7); ctx.fill();
  ctx.shadowBlur=0;

  // Roof
  if(isBus){
    ctx.fillStyle=color+'cc';
    ctx.fillRect(-bw/2+4,-bh-14,bw-8,18);
  } else {
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.roundRect(-24,-bh+4,48,22,4); ctx.fill();
  }

  // Windows
  ctx.fillStyle='rgba(120,200,255,0.55)';
  if(isBus){
    for(let wx=-bw/2+6;wx<bw/2-6;wx+=18) ctx.fillRect(wx,-bh+4,12,16);
  } else {
    ctx.fillRect(-22,-bh+6,18,16); ctx.fillRect(4,-bh+6,18,16);
  }

  // Wheels
  ctx.fillStyle='#1a1a1a';
  const wxs=isBus?[-30,30,-30,30]:[-26,26,-26,26];
  const wys=isBus?[-4,-4,-bh+4,-bh+4]:[-4,-4,-bh+4,-bh+4];
  wxs.forEach((wx,i)=>{
    const wr=isBus?11:9;
    ctx.beginPath(); ctx.arc(wx,wys[i],wr,0,tau); ctx.fill();
    ctx.fillStyle='#666';
    ctx.beginPath(); ctx.arc(wx,wys[i],wr-4,0,tau); ctx.fill();
    ctx.fillStyle='#1a1a1a';
  });

  // Headlights glow
  ctx.fillStyle='#fffacd';
  ctx.shadowColor='#ff0'; ctx.shadowBlur=14;
  const hlx=isBus?[-32,32]:[-28,28];
  hlx.forEach(hx=>ctx.fillRect(hx,-bh-3,10,7));
  ctx.shadowBlur=0;

  // Tail lights
  ctx.fillStyle='#ff3322';
  ctx.shadowColor='#f00'; ctx.shadowBlur=8;
  hlx.forEach(hx=>ctx.fillRect(hx,-7,10,7));
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawCollectible(c) {
  if(c.collected && c.alpha<=0) return;
  const bob=Math.sin(c.bob)*4;
  ctx.save(); ctx.globalAlpha=c.alpha;
  ctx.translate(c.x, c.y+bob);

  if(c.type==='nitro') {
    ctx.shadowColor=C.cyan; ctx.shadowBlur=18;
    ctx.fillStyle=C.cyan+'33';
    ctx.beginPath(); ctx.arc(0,0,16,0,tau); ctx.fill();
    ctx.fillStyle=C.cyan;
    ctx.beginPath(); ctx.arc(0,0,11,0,tau); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⚡',0,0);
  } else if(c.type==='gem') {
    ctx.shadowColor=C.cyan; ctx.shadowBlur=16;
    ctx.fillStyle=C.cyan;
    ctx.save(); ctx.rotate(Math.PI/4+frame*0.02);
    ctx.fillRect(-8,-8,16,16);
    ctx.restore();
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.save(); ctx.rotate(Math.PI/4+frame*0.02);
    ctx.fillRect(-4,-8,4,4);
    ctx.restore();
  } else if(c.type==='star') {
    ctx.shadowColor=C.yellow; ctx.shadowBlur=14;
    ctx.fillStyle=C.yellow;
    drawStar(ctx,0,0,5,11,5.5);
  } else {
    // Coin
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=10;
    ctx.fillStyle='#ffd700';
    ctx.beginPath();
    ctx.ellipse(0,0,10,10,frame*0.04%Math.PI,0,tau);
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.ellipse(-3,-3,4,4,0,0,tau); ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawStar(ctx,cx,cy,spikes,outerR,innerR) {
  let rot=Math.PI/2*3, step=Math.PI/spikes;
  ctx.beginPath(); ctx.moveTo(cx,cy-outerR);
  for(let i=0;i<spikes;i++){
    ctx.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR); rot+=step;
    ctx.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR); rot+=step;
  }
  ctx.closePath(); ctx.fill();
}

function drawScooter() {
  ctx.save();
  ctx.translate(laneX, py);
  if(flipping) ctx.rotate(flipRot);

  // Trail
  trails.slice().reverse().forEach((t,i)=>{
    const a=t.life*0.25;
    const dx=t.x-laneX, dy=t.y-py;
    ctx.save();
    ctx.globalAlpha=a;
    ctx.fillStyle=nitroOn?C.cyan:C.purple;
    ctx.beginPath(); ctx.arc(dx,dy,t.r,0,tau); ctx.fill();
    ctx.restore();
  });

  // Shadow on ground
  if(onGround){
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0,4,20,6,0,0,tau); ctx.fill();
  }

  // Wheels
  const wAngle = (groundOff/10)*tau;
  ctx.fillStyle='#1a1a1a';
  [[-15,1],[15,1]].forEach(([wx,wy])=>{
    ctx.beginPath(); ctx.arc(wx,wy,9,0,tau); ctx.fill();
    ctx.save(); ctx.translate(wx,wy);
    ctx.rotate(wAngle*(flipping?3:1));
    ctx.strokeStyle='#555'; ctx.lineWidth=2;
    [0,Math.PI/2,Math.PI,Math.PI*1.5].forEach(a=>{
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*7,Math.sin(a)*7); ctx.stroke();
    });
    ctx.restore();
    ctx.fillStyle='#444';
    ctx.beginPath(); ctx.arc(wx,wy,4,0,tau); ctx.fill();
    ctx.fillStyle='#1a1a1a';
  });

  // Deck
  ctx.fillStyle='#9000dd';
  ctx.shadowColor=C.purple; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.roundRect(-22,-5,44,8,3); ctx.fill();
  ctx.shadowBlur=0;

  // Deck grip tape design
  ctx.fillStyle='rgba(255,255,255,0.12)';
  for(let i=-18;i<20;i+=5) ctx.fillRect(i,-5,2,8);

  // Fork / stem
  ctx.strokeStyle='#ccc'; ctx.lineWidth=4;
  ctx.lineCap='round';
  ctx.shadowColor='#ccc'; ctx.shadowBlur=4;
  ctx.beginPath(); ctx.moveTo(-5,-4); ctx.lineTo(-8,-26); ctx.stroke();

  // Handlebar
  ctx.beginPath(); ctx.moveTo(-20,-27); ctx.lineTo(10,-27); ctx.stroke();
  ctx.shadowBlur=0;

  // Grips
  ctx.fillStyle='#333';
  [[-20,-27],[10,-27]].forEach(([gx,gy])=>{
    ctx.beginPath(); ctx.arc(gx,gy,4,0,tau); ctx.fill();
  });

  // Rider legs
  ctx.fillStyle='#333';
  ctx.fillRect(-8,-4,7,16); ctx.fillRect(1,-4,7,16);

  // Body
  ctx.fillStyle= nitroOn ? '#00e5ff' : '#ff8800';
  ctx.shadowColor=nitroOn?C.cyan:C.orange; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.roundRect(-10,-44,20,28,5); ctx.fill();
  ctx.shadowBlur=0;

  // Arms
  ctx.fillStyle='#ff8800';
  ctx.fillRect(-18,-38,8,5); ctx.fillRect(10,-38,8,5);

  // Head
  ctx.fillStyle='#ffcb95';
  ctx.beginPath(); ctx.arc(0,-52,10,0,tau); ctx.fill();

  // Helmet
  ctx.fillStyle=nitroOn?C.cyan:C.purple;
  ctx.shadowColor=nitroOn?C.cyan:C.purple; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.arc(0,-52,10,Math.PI,tau); ctx.fill();
  // Visor
  ctx.fillStyle='rgba(0,245,255,0.4)';
  ctx.beginPath(); ctx.arc(0,-52,10,Math.PI+0.3,tau-0.3); ctx.fill();
  ctx.shadowBlur=0;

  // Nitro flame
  if(nitroOn){
    for(let fi=0;fi<3;fi++){
      const fw=rnd(8,16), fh=rnd(12,22);
      const fx=-22+rnd(-4,4), fy=rnd(-2,2);
      const fg=ctx.createLinearGradient(fx-fw/2,fy,fx+fw/2,fy+fh);
      fg.addColorStop(0,'rgba(0,245,255,0.9)');
      fg.addColorStop(0.5,'rgba(191,0,255,0.6)');
      fg.addColorStop(1,'transparent');
      ctx.fillStyle=fg;
      ctx.beginPath(); ctx.ellipse(fx,fy+fh/2,fw/2,fh/2,0,0,tau); ctx.fill();
    }
  }

  ctx.restore();
}

function drawParticles() {
  ctx.save();
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.shadowColor=p.col; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,tau); ctx.fill();
  });
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.restore();
}

function drawFloats() {
  ctx.save();
  floats.forEach(f=>{
    ctx.globalAlpha=f.life;
    ctx.fillStyle=f.col;
    ctx.shadowColor=f.col; ctx.shadowBlur=8;
    ctx.font='bold 16px "Exo 2",sans-serif';
    ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
  });
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.restore();
}

function drawHitFlash() {
  if(hitFlash>0){
    ctx.fillStyle=`rgba(255,0,0,${hitFlash*0.02})`;
    ctx.fillRect(0,0,W,H);
  }
}

function drawNitroEffect() {
  if(!nitroOn) return;
  // Speed lines
  ctx.save();
  ctx.strokeStyle='rgba(0,245,255,0.12)';
  ctx.lineWidth=1;
  for(let i=0;i<10;i++){
    const lx=((i*71+frame*12)%W);
    ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx-30,H); ctx.stroke();
  }
  // Screen tint
  ctx.fillStyle='rgba(0,245,255,0.04)';
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,W,H);
  drawSky();
  drawRoad();
  ramps.forEach(r=>drawRamp(r));
  obstacles.forEach(o=>drawCar(o));
  collectibles.forEach(c=>drawCollectible(c));
  drawScooter();
  drawParticles();
  drawFloats();
  drawNitroEffect();
  drawHitFlash();
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hScore').textContent=score;
  document.getElementById('hBest').textContent=Math.max(best,score);
  document.getElementById('hCoins').textContent=coins;
}

// ─── Death ────────────────────────────────────────────────────────────────────
function die() {
  STATE='dead';
  burst(laneX,py,'#ff0080',25,8);
  burst(laneX,py,'#ff6a00',15,6);
  if(score>best){ best=score; document.getElementById('oBest').style.display='block'; }
  else document.getElementById('oBest').style.display='none';
  document.getElementById('oScore').textContent=score;
  document.getElementById('oCoins').textContent=coins;
  document.getElementById('oTricks').textContent=totalTricks;
  document.getElementById('oDist').textContent=Math.floor(distance)+'m';
  setTimeout(()=>document.getElementById('sOver').classList.remove('off'),400);
}

// ─── Loop ─────────────────────────────────────────────────────────────────────
function loop() {
  if(STATE==='play') update();
  render();
  requestAnimationFrame(loop);
}

// ─── Button handlers ──────────────────────────────────────────────────────────
document.getElementById('btnStart').addEventListener('click',()=>{
  init(); STATE='play';
  document.getElementById('sStart').classList.add('off');
});
document.getElementById('btnRetry').addEventListener('click',()=>{
  init(); STATE='play';
  document.getElementById('sOver').classList.add('off');
});

loop();
</script>
